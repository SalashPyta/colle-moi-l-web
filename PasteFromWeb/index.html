<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        :root {
            --bg: #07100b;
            --txt: #eaf5ee;
            --muted: #5f7d6b;
            --label: #5a7d68;
            --field: #0c1a12;
            --field-bd: #1c3a28;
            --green: #46e08a;
            --green-bright: #7df0a6;
            --green-soft: #3fd585;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; min-height: 100%;
            background: var(--bg); color: var(--txt);
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            user-select: none; -webkit-user-select: none;
            background-image: radial-gradient(rgba(70,224,138,.10) 1px, transparent 1px);
            background-size: 22px 22px;
        }
        #wrap {
            min-height: 100vh; padding: 26px 22px;
            display: flex; flex-direction: column;
        }

        .kicker {
            font-size: 11px; font-weight: 600; letter-spacing: 4px;
            color: var(--green-soft); opacity: .85; text-transform: uppercase;
        }
        h1 {
            margin: 7px 0 0; font-size: 30px; line-height: 1.04; font-weight: 800;
            letter-spacing: .5px; text-transform: uppercase; color: #fff;
            text-shadow: 0 0 22px rgba(70,224,138,.28);
        }

        .status { margin-top: 15px; display: flex; align-items: center; gap: 9px; font-size: 13px; }
        .dot {
            width: 9px; height: 9px; border-radius: 50%; background: var(--green);
            box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; flex: none;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
        #status { color: var(--txt); line-height: 1.4; }
        #status.ok { color: var(--green-bright); }
        #status.err { color: #ff7a7a; }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(70,224,138,.18), transparent); margin: 22px 0; }

        /* gros bouton */
        #paste {
            width: 100%; border: none; border-radius: 999px;
            padding: 20px; font-size: 17px; font-weight: 800; letter-spacing: 1px;
            color: #06140b; cursor: pointer; text-transform: uppercase;
            background: linear-gradient(120deg, #36c878 0%, #5fe095 45%, #8af3ab 100%);
            box-shadow: 0 0 32px rgba(70,224,138,.45), inset 0 1px 0 rgba(255,255,255,.35);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: transform .12s, box-shadow .12s, filter .12s;
        }
        #paste:hover { transform: translateY(-1px); box-shadow: 0 0 42px rgba(70,224,138,.6), inset 0 1px 0 rgba(255,255,255,.4); }
        #paste:active { transform: translateY(0); filter: brightness(.95); }
        #paste:disabled { filter: grayscale(.3) brightness(.8); cursor: default; }
        #paste svg { width: 19px; height: 19px; }

        /* astuce */
        .tip {
            margin-top: 18px; align-self: center;
            font-size: 11px; color: var(--muted);
            display: inline-flex; align-items: center; gap: 7px;
            padding: 7px 13px; border: 1px solid var(--field-bd); border-radius: 999px;
            background: var(--field);
        }
        kbd {
            font-family: inherit; font-size: 10.5px; font-weight: 700;
            padding: 1px 6px; border-radius: 5px; color: var(--green-bright);
            background: #0f2417; border: 1px solid var(--field-bd);
        }

        .spacer { flex: 1; }
        .foot { text-align: center; font-size: 11.5px; color: var(--muted); }
        .foot b { color: var(--green-bright); font-weight: 700; }
        .credit {
            text-align: center; margin-top: 6px; font-size: 10.5px;
            color: var(--label); letter-spacing: .3px;
        }
        .credit b { color: var(--green-bright); font-weight: 700; }
        #update {
            margin: 10px auto 0; display: block; background: transparent;
            border: none; color: var(--muted); font-size: 10.5px; cursor: pointer;
            text-decoration: underline; opacity: .8; font-family: inherit;
        }
        #update:hover { color: var(--green-bright); opacity: 1; }
        #update.hasupd {
            color: #06140b; background: var(--green-bright); text-decoration: none;
            padding: 6px 12px; border-radius: 999px; font-weight: 700; opacity: 1;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div class="kicker">Image du web → Premiere</div>
        <h1>Colle<br>moi l'web</h1>

        <div class="status">
            <span class="dot"></span>
            <span id="status">Prêt à coller</span>
        </div>

        <div class="divider"></div>

        <button id="paste">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 4h6a1 1 0 011 1v1h1.5A1.5 1.5 0 0119 7.5v11A1.5 1.5 0 0117.5 20h-11A1.5 1.5 0 015 18.5v-11A1.5 1.5 0 016.5 6H8V5a1 1 0 011-1z" stroke="#06140b" stroke-width="1.7" stroke-linejoin="round"/>
                <path d="M9.5 4.5h5V6h-5z" fill="#06140b"/>
                <path d="M12 10.3v5.4m0 0l-2.2-2.2M12 15.7l2.2-2.2" stroke="#06140b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Coller l'image
        </button>

        <div class="tip">
            Astuce&nbsp; <kbd id="kbdMod">⌘</kbd><kbd>V</kbd> &nbsp;directement dans la timeline
        </div>

        <div class="spacer"></div>
        <div class="foot">Téléchargée + rangée dans <b>image web</b></div>
        <div class="credit">Par <b>Salash</b> &amp; <b>Pytanix</b></div>
        <button id="update">Vérifier les mises à jour</button>
    </div>
    <script src="./js/CSInterface.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
